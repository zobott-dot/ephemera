<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ephemera</title>
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }

  body {
    position: fixed;
    inset: 0;
    background: radial-gradient(
      ellipse at 50% 50%,
      #1a1520 0%,
      #130f17 35%,
      #0d0a10 65%,
      #08060a 100%
    );
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .breath {
    position: relative;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    animation: breathe 12s cubic-bezier(0.4, 0, 0.6, 1) infinite;
  }

  .breath::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(
      circle at center,
      rgba(225, 215, 235, 0.95) 0%,
      rgba(200, 185, 215, 0.7) 20%,
      rgba(170, 150, 190, 0.3) 45%,
      rgba(140, 120, 165, 0.08) 70%,
      transparent 100%
    );
    animation: breathe-glow 12s cubic-bezier(0.4, 0, 0.6, 1) infinite;
  }

  .breath::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(
      circle at center,
      rgba(180, 160, 200, 0.12) 0%,
      rgba(150, 130, 175, 0.05) 40%,
      transparent 70%
    );
    animation: breathe-bloom 12s cubic-bezier(0.4, 0, 0.6, 1) infinite;
  }

  @keyframes breathe {
    0%, 100% {
      width: 4px;
      height: 4px;
      background: rgba(220, 210, 230, 0.9);
      box-shadow:
        0 0 4px 1px rgba(210, 195, 225, 0.6),
        0 0 8px 2px rgba(190, 170, 210, 0.3);
    }
    50% {
      width: 8px;
      height: 8px;
      background: rgba(235, 228, 240, 1);
      box-shadow:
        0 0 6px 2px rgba(220, 208, 235, 0.8),
        0 0 15px 5px rgba(195, 175, 215, 0.4),
        0 0 30px 10px rgba(170, 148, 195, 0.15);
    }
  }

  @keyframes breathe-glow {
    0%, 100% {
      width: 40px;
      height: 40px;
      opacity: 0.6;
    }
    50% {
      width: 70px;
      height: 70px;
      opacity: 1;
    }
  }

  @keyframes breathe-bloom {
    0%, 100% {
      width: 90px;
      height: 90px;
      opacity: 0.4;
    }
    50% {
      width: 160px;
      height: 160px;
      opacity: 0.7;
    }
  }
</style>
</head>
<body>
  <div class="breath"></div>
  <script>
    document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
  </script>
</body>
</html>

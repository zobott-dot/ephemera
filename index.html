<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08060a">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" id="apple-icon">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<title>Ephemera</title>
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    background-color: #08060a;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }

  body {
    position: fixed;
    inset: 0;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    background-color: #08060a;
    background-image: radial-gradient(
      ellipse at 50% 50%,
      #1a1520 0%,
      #130f17 35%,
      #0d0a10 65%,
      #08060a 100%
    );
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .breath {
    position: relative;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    animation: breathe 12s cubic-bezier(0.4, 0, 0.6, 1) infinite;
  }

  .breath::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(
      circle at center,
      rgba(225, 215, 235, 0.95) 0%,
      rgba(200, 185, 215, 0.7) 20%,
      rgba(170, 150, 190, 0.3) 45%,
      rgba(140, 120, 165, 0.08) 70%,
      transparent 100%
    );
    animation: breathe-glow 12s cubic-bezier(0.4, 0, 0.6, 1) infinite;
  }

  .breath::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(
      circle at center,
      rgba(180, 160, 200, 0.12) 0%,
      rgba(150, 130, 175, 0.05) 40%,
      transparent 70%
    );
    animation: breathe-bloom 12s cubic-bezier(0.4, 0, 0.6, 1) infinite;
  }

  @keyframes breathe {
    0%, 100% {
      width: 4px;
      height: 4px;
      background: rgba(220, 210, 230, 0.9);
      box-shadow:
        0 0 4px 1px rgba(210, 195, 225, 0.6),
        0 0 8px 2px rgba(190, 170, 210, 0.3);
    }
    50% {
      width: 8px;
      height: 8px;
      background: rgba(235, 228, 240, 1);
      box-shadow:
        0 0 6px 2px rgba(220, 208, 235, 0.8),
        0 0 15px 5px rgba(195, 175, 215, 0.4),
        0 0 30px 10px rgba(170, 148, 195, 0.15);
    }
  }

  @keyframes breathe-glow {
    0%, 100% {
      width: 40px;
      height: 40px;
      opacity: 0.6;
    }
    50% {
      width: 70px;
      height: 70px;
      opacity: 1;
    }
  }

  @keyframes breathe-bloom {
    0%, 100% {
      width: 90px;
      height: 90px;
      opacity: 0.4;
    }
    50% {
      width: 160px;
      height: 160px;
      opacity: 0.7;
    }
  }
</style>
</head>
<body>
  <div class="breath"></div>
  <script>
    document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

    (function generateIcon() {
      var s = 180;
      var c = document.createElement('canvas');
      c.width = s;
      c.height = s;
      var ctx = c.getContext('2d');
      var cx = s / 2;

      ctx.fillStyle = '#08060a';
      ctx.fillRect(0, 0, s, s);

      var bloom = ctx.createRadialGradient(cx, cx, 0, cx, cx, 60);
      bloom.addColorStop(0, 'rgba(180,160,200,0.12)');
      bloom.addColorStop(0.5, 'rgba(150,130,175,0.05)');
      bloom.addColorStop(1, 'rgba(150,130,175,0)');
      ctx.fillStyle = bloom;
      ctx.beginPath();
      ctx.arc(cx, cx, 60, 0, Math.PI * 2);
      ctx.fill();

      var glow = ctx.createRadialGradient(cx, cx, 0, cx, cx, 28);
      glow.addColorStop(0, 'rgba(225,215,235,0.9)');
      glow.addColorStop(0.25, 'rgba(200,185,215,0.6)');
      glow.addColorStop(0.55, 'rgba(170,150,190,0.2)');
      glow.addColorStop(0.8, 'rgba(140,120,165,0.05)');
      glow.addColorStop(1, 'rgba(140,120,165,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(cx, cx, 28, 0, Math.PI * 2);
      ctx.fill();

      var core = ctx.createRadialGradient(cx, cx, 0, cx, cx, 5);
      core.addColorStop(0, 'rgba(255,255,255,1)');
      core.addColorStop(0.4, 'rgba(235,228,240,0.95)');
      core.addColorStop(1, 'rgba(220,210,230,0.85)');
      ctx.fillStyle = core;
      ctx.beginPath();
      ctx.arc(cx, cx, 5, 0, Math.PI * 2);
      ctx.fill();

      var link = document.getElementById('apple-icon');
      if (link) link.href = c.toDataURL('image/png');
    })();
  </script>
</body>
</html>

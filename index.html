<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08060a">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" id="apple-icon">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<title>Ephemera</title>
<style>
  @property --bg-center { syntax: '<color>'; inherits: true; initial-value: #1a1520; }
  @property --bg-mid { syntax: '<color>'; inherits: true; initial-value: #130f17; }
  @property --bg-outer { syntax: '<color>'; inherits: true; initial-value: #0d0a10; }
  @property --bg-edge { syntax: '<color>'; inherits: true; initial-value: #08060a; }
  @property --bg-y { syntax: '<percentage>'; inherits: true; initial-value: 50%; }

  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    background-color: var(--bg-edge, #08060a);
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }

  body {
    position: fixed;
    inset: 0;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    background-color: var(--bg-edge, #08060a);
    background-image: radial-gradient(
      ellipse at 50% var(--bg-y, 50%),
      var(--bg-center, #1a1520) 0%,
      var(--bg-mid, #130f17) 35%,
      var(--bg-outer, #0d0a10) 65%,
      var(--bg-edge, #08060a) 100%
    );
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .breath {
    position: absolute;
    border-radius: 50%;
    will-change: transform, opacity;
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="breath breath-bloom"></div>
  <div class="breath breath-glow"></div>
  <div class="breath breath-core"></div>
  <script>
    document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

    (function() {
      var root = document.documentElement;
      var bloomEl = document.querySelector('.breath-bloom');
      var glowEl = document.querySelector('.breath-glow');
      var coreEl = document.querySelector('.breath-core');
      var themeMeta = document.querySelector('meta[name="theme-color"]');

      // --- Gradient stop structures ---
      // Each entry: [position%, colorBlend (0=bright 1=dim), alpha]
      var GLOW_S = [
        [0,0,.85],[3,.031,.8],[6,.072,.74],[9,.113,.67],[12,.155,.6],
        [16,.206,.52],[20,.258,.44],[25,.32,.37],[30,.381,.3],[35,.443,.24],
        [40,.505,.19],[45,.567,.15],[50,.629,.115],[55,.691,.085],[60,.753,.06],
        [65,.794,.042],[70,.835,.028],[76,.876,.016],[82,.918,.008],[88,.959,.003],
        [94,1,.001],[100,1,0]
      ];
      var BLOOM_S = [
        [0,0,.1],[5,.067,.095],[10,.167,.088],[16,.267,.078],[23,.4,.066],
        [30,.5,.054],[38,.6,.042],[46,.667,.032],[54,.733,.022],[62,.833,.014],
        [72,.933,.007],[82,1,.002],[100,1,0]
      ];
      var CORE_S = [
        [0,0,1],[5,.039,.98],[10,.098,.96],[16,.157,.93],[22,.216,.9],
        [28,.294,.85],[34,.373,.78],[40,.451,.7],[47,.529,.6],[54,.608,.48],
        [62,.686,.36],[70,.765,.24],[78,.843,.14],[86,.922,.06],[93,1,.02],[100,1,0]
      ];
      var GL_D=[92,94,80], BL_D=[28,28,25], CO_D=[44,44,36];

      function buildGrad(stops, bright, off) {
        var dim=[Math.max(0,bright[0]-off[0]),Math.max(0,bright[1]-off[1]),Math.max(0,bright[2]-off[2])];
        var p=[], i, s, r, g, b;
        for (i=0; i<stops.length; i++) {
          s=stops[i];
          if (s[2]===0) { p.push('transparent '+s[0]+'%'); continue; }
          r=Math.round(bright[0]+(dim[0]-bright[0])*s[1]);
          g=Math.round(bright[1]+(dim[1]-bright[1])*s[1]);
          b=Math.round(bright[2]+(dim[2]-bright[2])*s[1]);
          p.push('rgba('+r+','+g+','+b+','+s[2]+') '+s[0]+'%');
        }
        return 'radial-gradient(circle at center,'+p.join(',')+')';
      }

      // --- Solar position ---
      function solarPos(lat, lon) {
        var now=new Date(), rad=Math.PI/180;
        var doy=Math.floor((now - new Date(now.getFullYear(),0,0))/864e5);
        var decl=-23.45*Math.cos(rad*360/365*(doy+10));
        var B=rad*360/365*(doy-81);
        var eot=9.87*Math.sin(2*B)-7.53*Math.cos(B)-1.5*Math.sin(B);
        var utcH=now.getUTCHours()+now.getUTCMinutes()/60+now.getUTCSeconds()/3600;
        var ha=(utcH+lon/15+eot/60-12)*15;
        var sinE=Math.sin(lat*rad)*Math.sin(decl*rad)+Math.cos(lat*rad)*Math.cos(decl*rad)*Math.cos(ha*rad);
        return {elevation:Math.asin(Math.max(-1,Math.min(1,sinE)))/rad, rising:ha<0};
      }

      // --- Palette ---
      var PAL=[
        {e:-90,bg:[[26,21,32],[19,15,23],[13,10,16],[8,6,10]],gl:[208,216,235],bl:[146,150,180],co:[235,240,255],y:50},
        {e:-18,bg:[[26,21,32],[19,15,23],[13,10,16],[8,6,10]],gl:[208,216,235],bl:[146,150,180],co:[235,240,255],y:50},
        {e:-12,bg:[[24,21,35],[18,16,27],[12,10,18],[8,6,11]],gl:[212,218,232],bl:[148,152,178],co:[238,242,252],y:50},
        {e:-6, bg:[[28,22,30],[21,16,22],[14,11,15],[9,7,10]],gl:[225,218,210],bl:[160,155,160],co:[248,242,232],y:52},
        {e:0,  bg:[[34,22,24],[25,16,18],[16,11,13],[10,7,9]], gl:[238,218,195],bl:[172,158,145],co:[255,242,218],y:55},
        {e:8,  bg:[[36,24,22],[27,18,16],[18,12,11],[11,8,8]], gl:[240,222,195],bl:[175,162,148],co:[255,244,218],y:54},
        {e:20, bg:[[32,26,30],[23,19,22],[15,12,15],[10,8,10]],gl:[236,230,215],bl:[170,166,158],co:[252,248,232],y:52},
        {e:35, bg:[[30,26,32],[22,19,24],[15,12,16],[9,8,10]], gl:[234,228,218],bl:[168,164,160],co:[252,248,238],y:50},
        {e:90, bg:[[30,26,32],[22,19,24],[15,12,16],[9,8,10]], gl:[234,228,218],bl:[168,164,160],co:[252,248,238],y:50}
      ];

      function lerp(a,b,t){return a+(b-a)*t;}
      function lC(a,b,t){return[Math.round(lerp(a[0],b[0],t)),Math.round(lerp(a[1],b[1],t)),Math.round(lerp(a[2],b[2],t))];}

      function computePalette(elev,rising){
        var lo=PAL[0],hi=PAL[PAL.length-1],i;
        for(i=0;i<PAL.length-1;i++){
          if(elev>=PAL[i].e&&elev<PAL[i+1].e){lo=PAL[i];hi=PAL[i+1];break;}
        }
        if(elev>=PAL[PAL.length-1].e) lo=hi=PAL[PAL.length-1];
        var t=hi.e===lo.e?0:(elev-lo.e)/(hi.e-lo.e);

        var pal={
          bg:[lC(lo.bg[0],hi.bg[0],t),lC(lo.bg[1],hi.bg[1],t),lC(lo.bg[2],hi.bg[2],t),lC(lo.bg[3],hi.bg[3],t)],
          gl:lC(lo.gl,hi.gl,t), bl:lC(lo.bl,hi.bl,t), co:lC(lo.co,hi.co,t),
          y:lerp(lo.y,hi.y,t)
        };

        if(!rising&&elev>-12&&elev<20){
          var ds=1;
          if(elev<-6) ds=(elev+12)/6;
          else if(elev>8) ds=(20-elev)/12;
          var sr=Math.round(3*ds),sb=Math.round(4*ds);
          pal.bg[0]=[Math.max(0,pal.bg[0][0]-sr),pal.bg[0][1],Math.min(255,pal.bg[0][2]+sb)];
          pal.bg[1]=[Math.max(0,pal.bg[1][0]-Math.round(2*ds)),pal.bg[1][1],Math.min(255,pal.bg[1][2]+Math.round(3*ds))];
          var lr=Math.round(5*ds),lb=Math.round(6*ds);
          pal.gl=[Math.max(0,pal.gl[0]-lr),pal.gl[1],Math.min(255,pal.gl[2]+lb)];
          pal.bl=[Math.max(0,pal.bl[0]-Math.round(4*ds)),pal.bl[1],Math.min(255,pal.bl[2]+Math.round(5*ds))];
          pal.co=[Math.max(0,pal.co[0]-Math.round(4*ds)),pal.co[1],Math.min(255,pal.co[2]+Math.round(5*ds))];
        }
        return pal;
      }

      function rgb(c){return 'rgb('+c[0]+','+c[1]+','+c[2]+')';}

      var BG_PROPS=['--bg-center','--bg-mid','--bg-outer','--bg-edge','--bg-y'];

      function applyPalette(pal){
        root.style.setProperty('--bg-center',rgb(pal.bg[0]));
        root.style.setProperty('--bg-mid',rgb(pal.bg[1]));
        root.style.setProperty('--bg-outer',rgb(pal.bg[2]));
        root.style.setProperty('--bg-edge',rgb(pal.bg[3]));
        root.style.setProperty('--bg-y',pal.y+'%');
        bloomEl.style.backgroundImage=buildGrad(BLOOM_S,pal.bl,BL_D);
        glowEl.style.backgroundImage=buildGrad(GLOW_S,pal.gl,GL_D);
        coreEl.style.backgroundImage=buildGrad(CORE_S,pal.co,CO_D);
        if(themeMeta) themeMeta.content=rgb(pal.bg[3]);
      }

      function enableTransitions(secs){
        root.style.transition=BG_PROPS.map(function(p){return p+' '+secs+'s linear';}).join(',');
      }

      // --- Location ---
      function getLocation(cb){
        var cached;
        try{cached=JSON.parse(localStorage.getItem('ephemera.location'));}catch(e){}
        if(cached&&cached.lat!=null){cb(cached.lat,cached.lon);return;}
        if(navigator.geolocation){
          navigator.geolocation.getCurrentPosition(
            function(pos){
              try{localStorage.setItem('ephemera.location',JSON.stringify({lat:pos.coords.latitude,lon:pos.coords.longitude,ts:Date.now()}));}catch(e){}
              cb(pos.coords.latitude,pos.coords.longitude);
            },
            function(){cb(41.99,-88.19);},
            {enableHighAccuracy:false,timeout:10000}
          );
        } else {cb(41.99,-88.19);}
      }

      // --- Init palette ---
      root.style.transition='none';
      applyPalette(computePalette(-90,true));
      root.offsetHeight;
      root.style.removeProperty('transition');

      var painted=false;
      requestAnimationFrame(function(){painted=true;});

      getLocation(function(lat,lon){
        var sun=solarPos(lat,lon);
        var pal=computePalette(sun.elevation,sun.rising);
        if(painted){
          enableTransitions(3);
          applyPalette(pal);
          setTimeout(function(){enableTransitions(60);},3500);
        } else {
          root.style.transition='none';
          applyPalette(pal);
          root.offsetHeight;
          root.style.removeProperty('transition');
          enableTransitions(60);
        }
        setInterval(function(){
          var s=solarPos(lat,lon);
          applyPalette(computePalette(s.elevation,s.rising));
        },60000);
      });

      // --- Breathing animation ---
      var minScale=0.02, maxScale=1.3;
      var bloomRatio=1.4, coreRatio=0.08;
      var baseCycle=11000, inhaleRatio=0.38, restRatio=0.10, driftRange=0.18;

      function vmax(){return Math.max(window.innerWidth,window.innerHeight);}
      function vary(base){return base*(1+(Math.random()*2-1)*driftRange);}

      function easeInhale(t){
        return t<0.7?0.5*Math.pow(t/0.7,1.8):0.5+0.5*(1-Math.pow(1-(t-0.7)/0.3,2.5));
      }
      function easeExhale(t){
        return 1-(t<0.15?0.05*Math.pow(t/0.15,2.8):0.05+0.95*Math.pow((t-0.15)/0.85,1.6));
      }

      function applySize(scale){
        var v=vmax();
        var glowSize=v*scale, bloomSize=glowSize*bloomRatio, coreSize=Math.max(4,glowSize*coreRatio);

        bloomEl.style.width=bloomEl.style.height=bloomSize+'px';
        bloomEl.style.left=(window.innerWidth-bloomSize)/2+'px';
        bloomEl.style.top=(window.innerHeight-bloomSize)/2+'px';

        glowEl.style.width=glowEl.style.height=glowSize+'px';
        glowEl.style.left=(window.innerWidth-glowSize)/2+'px';
        glowEl.style.top=(window.innerHeight-glowSize)/2+'px';

        coreEl.style.width=coreEl.style.height=coreSize+'px';
        coreEl.style.left=(window.innerWidth-coreSize)/2+'px';
        coreEl.style.top=(window.innerHeight-coreSize)/2+'px';

        var n=(scale-minScale)/(maxScale-minScale);
        bloomEl.style.opacity=0.3+n*0.7;
        glowEl.style.opacity=0.4+n*0.6;
        coreEl.style.opacity=0.6+n*0.4;
      }

      var cycleStart=0,inhaleDur=0,restDur=0,exhaleDur=0,totalDur=0;

      function newCycle(now){
        cycleStart=now;
        totalDur=vary(baseCycle);
        inhaleDur=totalDur*vary(inhaleRatio);
        restDur=totalDur*vary(restRatio);
        exhaleDur=totalDur-inhaleDur-restDur;
      }

      function tick(now){
        if(!cycleStart) newCycle(now);
        var elapsed=now-cycleStart;
        if(elapsed>=totalDur){newCycle(now);elapsed=0;}

        var scale;
        if(elapsed<inhaleDur){
          scale=minScale+(maxScale-minScale)*easeInhale(elapsed/inhaleDur);
        } else if(elapsed<inhaleDur+restDur){
          scale=maxScale+Math.sin((elapsed-inhaleDur)/restDur*Math.PI)*0.008;
        } else {
          scale=minScale+(maxScale-minScale)*easeExhale((elapsed-inhaleDur-restDur)/exhaleDur);
        }
        applySize(scale);
        requestAnimationFrame(tick);
      }

      applySize(minScale+(maxScale-minScale)*0.3);
      requestAnimationFrame(tick);
    })();

    (function(){
      var s=180,c=document.createElement('canvas');
      c.width=s;c.height=s;
      var ctx=c.getContext('2d'),cx=s/2;
      ctx.fillStyle='#08060a';
      ctx.fillRect(0,0,s,s);
      var bloom=ctx.createRadialGradient(cx,cx,0,cx,cx,90);
      bloom.addColorStop(0,'rgba(180,160,200,0.15)');
      bloom.addColorStop(0.5,'rgba(150,130,175,0.06)');
      bloom.addColorStop(1,'rgba(150,130,175,0)');
      ctx.fillStyle=bloom;ctx.beginPath();ctx.arc(cx,cx,90,0,Math.PI*2);ctx.fill();
      var glow=ctx.createRadialGradient(cx,cx,0,cx,cx,56);
      glow.addColorStop(0,'rgba(225,215,235,0.9)');
      glow.addColorStop(0.25,'rgba(200,185,215,0.6)');
      glow.addColorStop(0.55,'rgba(170,150,190,0.2)');
      glow.addColorStop(0.8,'rgba(140,120,165,0.05)');
      glow.addColorStop(1,'rgba(140,120,165,0)');
      ctx.fillStyle=glow;ctx.beginPath();ctx.arc(cx,cx,56,0,Math.PI*2);ctx.fill();
      var core=ctx.createRadialGradient(cx,cx,0,cx,cx,12);
      core.addColorStop(0,'rgba(255,255,255,1)');
      core.addColorStop(0.4,'rgba(235,228,240,0.95)');
      core.addColorStop(1,'rgba(220,210,230,0.85)');
      ctx.fillStyle=core;ctx.beginPath();ctx.arc(cx,cx,12,0,Math.PI*2);ctx.fill();
      var link=document.getElementById('apple-icon');
      if(link) link.href=c.toDataURL('image/png');
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08060a">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" id="apple-icon">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<title>Ephemera</title>
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    background-color: #08060a;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }

  body {
    position: fixed;
    inset: 0;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    background-color: #08060a;
    background-image: radial-gradient(
      ellipse at 50% 50%,
      #1a1520 0%,
      #130f17 35%,
      #0d0a10 65%,
      #08060a 100%
    );
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .breath {
    position: absolute;
    border-radius: 50%;
    will-change: transform, opacity;
    pointer-events: none;
  }

  .breath-bloom {
    background: radial-gradient(
      circle at center,
      rgba(160, 140, 185, 0.10) 0%,
      rgba(140, 120, 165, 0.04) 40%,
      transparent 70%
    );
  }

  .breath-glow {
    background: radial-gradient(
      circle at center,
      rgba(225, 215, 235, 0.85) 0%,
      rgba(200, 185, 215, 0.55) 15%,
      rgba(170, 150, 190, 0.20) 40%,
      rgba(140, 120, 165, 0.05) 70%,
      transparent 100%
    );
  }

  .breath-core {
    background: radial-gradient(
      circle at center,
      rgba(255, 255, 255, 1) 0%,
      rgba(240, 232, 248, 0.9) 30%,
      rgba(220, 210, 230, 0.6) 60%,
      transparent 100%
    );
  }
</style>
</head>
<body>
  <div class="breath breath-bloom"></div>
  <div class="breath breath-glow"></div>
  <div class="breath breath-core"></div>
  <script>
    document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

    (function() {
      var bloom = document.querySelector('.breath-bloom');
      var glow = document.querySelector('.breath-glow');
      var core = document.querySelector('.breath-core');

      // Size range as fraction of viewport min dimension
      var minScale = 0.02;   // contracted: a gentle point
      var maxScale = 0.75;   // expanded: ~75% of screen width

      // Bloom is larger than glow, core is smallest
      var bloomRatio = 1.4;
      var coreRatio = 0.12;

      // Base durations (ms)
      var baseCycle = 11000;
      var inhaleRatio = 0.38;  // inhale is ~38%, exhale ~52%, rest ~10%
      var restRatio = 0.10;

      // Variation range: each cycle varies by +/- this fraction
      var driftRange = 0.18;

      function vmin() {
        return Math.min(window.innerWidth, window.innerHeight);
      }

      function vary(base) {
        return base * (1 + (Math.random() * 2 - 1) * driftRange);
      }

      // Custom easing: slow start, gentle peak, slow release
      // Uses a shaped power curve with a plateau near t=1
      function easeInhale(t) {
        // Slow to start, accelerates, then eases into peak
        return t < 0.7
          ? 0.5 * Math.pow(t / 0.7, 1.8)
          : 0.5 + 0.5 * (1 - Math.pow(1 - (t - 0.7) / 0.3, 2.5));
      }

      function easeExhale(t) {
        // Very slow to leave peak, then gradual release
        return 1 - (t < 0.15
          ? 0.05 * Math.pow(t / 0.15, 2.8)
          : 0.05 + 0.95 * Math.pow((t - 0.15) / 0.85, 1.6));
      }

      function applySize(scale) {
        var v = vmin();
        var glowSize = v * scale;
        var bloomSize = glowSize * bloomRatio;
        var coreSize = Math.max(4, glowSize * coreRatio);

        bloom.style.width = bloom.style.height = bloomSize + 'px';
        bloom.style.left = (window.innerWidth - bloomSize) / 2 + 'px';
        bloom.style.top = (window.innerHeight - bloomSize) / 2 + 'px';

        glow.style.width = glow.style.height = glowSize + 'px';
        glow.style.left = (window.innerWidth - glowSize) / 2 + 'px';
        glow.style.top = (window.innerHeight - glowSize) / 2 + 'px';

        core.style.width = core.style.height = coreSize + 'px';
        core.style.left = (window.innerWidth - coreSize) / 2 + 'px';
        core.style.top = (window.innerHeight - coreSize) / 2 + 'px';

        // Opacity breathes too
        var normalizedScale = (scale - minScale) / (maxScale - minScale);
        bloom.style.opacity = 0.3 + normalizedScale * 0.7;
        glow.style.opacity = 0.4 + normalizedScale * 0.6;
        core.style.opacity = 0.6 + normalizedScale * 0.4;
      }

      // Breath cycle state
      var cycleStart = 0;
      var inhaleDur = 0;
      var restDur = 0;
      var exhaleDur = 0;
      var totalDur = 0;

      function newCycle(now) {
        cycleStart = now;
        totalDur = vary(baseCycle);
        inhaleDur = totalDur * vary(inhaleRatio);
        restDur = totalDur * vary(restRatio);
        exhaleDur = totalDur - inhaleDur - restDur;
      }

      function tick(now) {
        if (!cycleStart) newCycle(now);

        var elapsed = now - cycleStart;

        if (elapsed >= totalDur) {
          newCycle(now);
          elapsed = 0;
        }

        var scale;
        if (elapsed < inhaleDur) {
          // Inhale
          scale = minScale + (maxScale - minScale) * easeInhale(elapsed / inhaleDur);
        } else if (elapsed < inhaleDur + restDur) {
          // Rest at peak — very subtle drift, not frozen
          var restT = (elapsed - inhaleDur) / restDur;
          var drift = Math.sin(restT * Math.PI) * 0.008;
          scale = maxScale + drift;
        } else {
          // Exhale
          var exhaleT = (elapsed - inhaleDur - restDur) / exhaleDur;
          scale = minScale + (maxScale - minScale) * easeExhale(exhaleT);
        }

        applySize(scale);
        requestAnimationFrame(tick);
      }

      // Start mid-breath so it feels already alive
      applySize(minScale + (maxScale - minScale) * 0.3);
      requestAnimationFrame(tick);
    })();

    (function generateIcon() {
      var s = 180;
      var c = document.createElement('canvas');
      c.width = s;
      c.height = s;
      var ctx = c.getContext('2d');
      var cx = s / 2;

      ctx.fillStyle = '#08060a';
      ctx.fillRect(0, 0, s, s);

      var bloom = ctx.createRadialGradient(cx, cx, 0, cx, cx, 90);
      bloom.addColorStop(0, 'rgba(180,160,200,0.15)');
      bloom.addColorStop(0.5, 'rgba(150,130,175,0.06)');
      bloom.addColorStop(1, 'rgba(150,130,175,0)');
      ctx.fillStyle = bloom;
      ctx.beginPath();
      ctx.arc(cx, cx, 90, 0, Math.PI * 2);
      ctx.fill();

      var glow = ctx.createRadialGradient(cx, cx, 0, cx, cx, 56);
      glow.addColorStop(0, 'rgba(225,215,235,0.9)');
      glow.addColorStop(0.25, 'rgba(200,185,215,0.6)');
      glow.addColorStop(0.55, 'rgba(170,150,190,0.2)');
      glow.addColorStop(0.8, 'rgba(140,120,165,0.05)');
      glow.addColorStop(1, 'rgba(140,120,165,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(cx, cx, 56, 0, Math.PI * 2);
      ctx.fill();

      var core = ctx.createRadialGradient(cx, cx, 0, cx, cx, 12);
      core.addColorStop(0, 'rgba(255,255,255,1)');
      core.addColorStop(0.4, 'rgba(235,228,240,0.95)');
      core.addColorStop(1, 'rgba(220,210,230,0.85)');
      ctx.fillStyle = core;
      ctx.beginPath();
      ctx.arc(cx, cx, 12, 0, Math.PI * 2);
      ctx.fill();

      var link = document.getElementById('apple-icon');
      if (link) link.href = c.toDataURL('image/png');
    })();
  </script>
</body>
</html>
